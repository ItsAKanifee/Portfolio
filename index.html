                onclick="(function(){const p=document.getElementById('dialog-p');p.innerHTML=(typeof InfoText!=='undefined'&&InfoText)?InfoText:'Contact me at: ajaycd@icloud.com';const d=document.getElementById('dialog');if(d) d.showModal();return false;})();">Contact
                Me</a>

    <section class="home">

    <section id="projects" class="projects">
        <!-- Project tiles will be inserted here by Project_Tile.js -->
    </section>



    <script src="Scripts/Info.js" defer></script>
    <script src="Scripts/Project_Tile.js" defer></script>
    <script src="Scripts/hamburger.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const filtersEl = document.getElementById('project-filters');
            const projectsSection = document.querySelector('.projects');

            function createFilterButtons(categories) {
                filtersEl.innerHTML = '';
                const allBtn = document.createElement('button');
                allBtn.textContent = 'All';
                allBtn.className = 'filter-btn active';
                filtersEl.appendChild(allBtn);
                allBtn.addEventListener('click', () => { setActive(allBtn); renderProjects(); });

                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                    btn.className = 'filter-btn';
                    filtersEl.appendChild(btn);
                    btn.addEventListener('click', () => { setActive(btn); renderProjects(cat); });
                });
            }

            function setActive(btn) {
                document.querySelectorAll('#project-filters .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            function renderProjects(category) {
                projectsSection.innerHTML = '';
                const items = (window.projectsData || []).filter(p => {
                    if (!category) return true;
                    return p.category && p.category === category;
                });
                ProjectTile.createGrid('.projects', items);
            }

            // load projects
            fetch('projects.json')
                .then(resp => resp.json())
                .then(data => {
                    window.projectsData = data;
                    const cats = Array.from(new Set(data.map(p => p.category).filter(Boolean)));
                    createFilterButtons(cats);
                    renderProjects();
                })
                .catch(err => {
                    console.error('Failed to load projects.json, falling back to inline list', err);
                    const projects = [
                        { id: 3, title: 'GPU Design', image: 'images/gpu.png', description: 'A GPU designed from the ground up in Verilog, with a custom instruction set and a software rasterizer to test it', repo: 'https://github.com/ItsAKanifee/GPU', tags: ['GPU', 'Verilog', 'hardware'], category: 'mixed' },
                        { id: 2, title: 'Quantum Squeezing', image: 'images/qs.png', repo: 'https://github.com/FRANK-RAN/Quantum-Measurement-Software', description: 'GPU Acceleration for faster data proccessing to better analyze the effect of Quantumly Squeezed Lasers', tags: ['quantum', 'GPU-acceleration'], category: 'software' },
                        { id: 1, title: 'Muse Brain Controller', image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTL6Wb_5CFsZf4hm8wdq6dgK4heVyo5daYczQ&s', description: 'EE + game controller using Muse', repo: 'https://github.com/ItsAKanifee/Muse_BrainReader_Game_Controller', tags: ['hardware', 'game'], category: 'hardware' },
                        { id: 0, title: 'Ray Tracer', image: 'images/rt.png', link: 'https://itsakanifee.github.io/Ray-Tracing/', description: 'Basic ray tracing demo', tags: ['graphics'], category: 'software' }
                    ];
                    window.projectsData = projects;
                    const cats = Array.from(new Set(projects.map(p => p.category).filter(Boolean)));
                    createFilterButtons(cats);
                    renderProjects();
                });
        });
    </script>
    <script src="Scripts/RayTracer.js" async defer></script>
</body>
